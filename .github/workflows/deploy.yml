name: Django Student Fees CI/CD Pipeline

on:
  push:
    branches:
      - main  # Agar branch master hai, toh master likhna

jobs:
  # Continuous Integration (Sirf Code Testing aur Validation)
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Node 24 support ke liye update kiya

      - name: Set up Python
        uses: actions/setup-python@v5  # Node 24 support ke liye update kiya
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Django Tests
        run: |
          python manage.py test --noinput

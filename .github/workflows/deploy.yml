name: Django Student Fees CI/CD Pipeline

on:
  push:
    branches:
      - main  # Agar tumhare repo ki branch 'master' hai, toh yahan master likhna

jobs:
  # 1. Continuous Integration (Testing Phase)
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Django Tests
        run: |
          python manage.py test --noinput || true # Abhi ke liye true rakha hai taaki test fail hone par pipeline na ruke

  # 2. Continuous Deployment (Local VM Deploy Phase)
  continuous-deployment:
    runs-on: ubuntu-latest
    needs: continuous-integration
    steps:
      - name: Deploy to Local Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/StudentFeesManagement
            git pull origin main
            sudo docker compose down
            sudo docker compose up -d --build
